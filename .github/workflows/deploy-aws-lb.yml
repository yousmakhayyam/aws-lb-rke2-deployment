name: Deploy AWS Load Balancer on RKE2 Cluster

on:
  push:
    branches: [master]
  workflow_dispatch: {}

env:
  AWS_REGION: us-east-1
  TF_VAR_my_ip_cidr: ${{ secrets.MY_IP_CIDR }}

jobs:
  # ---------------------------------------------------------------------
  # STAGE 1: Infra Deploy + Node Readiness
  # ---------------------------------------------------------------------
  infra-deploy:
    name: "Stage 1 - Infra Deploy & Node Ready Check"
    runs-on: ubuntu-latest
    outputs:
      master_ip: ${{ steps.get_master_ip.outputs.master_ip }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.6"

      - name: Terraform Init & Apply
        working-directory: terraform
        run: |
          terraform init
          terraform apply -auto-approve

      - name: Get master IP
        id: get_master_ip
        working-directory: terraform
        run: echo "master_ip=$(terraform output -raw master_public_ip)" >> $GITHUB_OUTPUT

      - name: Fetch kubeconfig and wait for nodes
        working-directory: terraform
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/rke2-key.pem
          chmod 600 ~/.ssh/rke2-key.pem
          MASTER_IP=$(terraform output -raw master_public_ip)
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/rke2-key.pem ubuntu@$MASTER_IP "sudo cp /etc/rancher/rke2/rke2.yaml /tmp/rke2.yaml && sudo chmod 644 /tmp/rke2.yaml"
          scp -o StrictHostKeyChecking=no -i ~/.ssh/rke2-key.pem ubuntu@$MASTER_IP:/tmp/rke2.yaml ./kubeconfig
          sed -i "s/127.0.0.1/$MASTER_IP/g" ./kubeconfig
          export KUBECONFIG=./kubeconfig
          kubectl wait --for=condition=Ready nodes --all --timeout=600s
          kubectl get nodes -o wide

  # ---------------------------------------------------------------------
  # STAGE 2: Run LB Script on Cluster
  # ---------------------------------------------------------------------
  lb-deploy:
    name: "Stage 2 - Run LB Script on Cluster"
    needs: infra-deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Fetch kubeconfig
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/rke2-key.pem
          chmod 600 ~/.ssh/rke2-key.pem
          MASTER_IP="${{ needs.infra-deploy.outputs.master_ip }}"
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/rke2-key.pem ubuntu@$MASTER_IP "sudo cp /etc/rancher/rke2/rke2.yaml /tmp/rke2.yaml && sudo chmod 644 /tmp/rke2.yaml"
          scp -o StrictHostKeyChecking=no -i ~/.ssh/rke2-key.pem ubuntu@$MASTER_IP:/tmp/rke2.yaml ./kubeconfig
          sed -i "s/127.0.0.1/$MASTER_IP/g" ./kubeconfig
          export KUBECONFIG=./kubeconfig

      - name: Run LB Script
        env:
          KUBECONFIG: ${{ github.workspace }}/kubeconfig
        working-directory: scripts
        run: bash lb-deploy.sh

  # ---------------------------------------------------------------------
  # STAGE 3: Install EBS CSI Driver
  # ---------------------------------------------------------------------
  ebs-csi-install:
    name: "Stage 3 - Install EBS CSI Driver"
    needs: 
      - infra-deploy
      - lb-deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Get Master IP from AWS
        id: get_master_ip
        run: |
          MASTER_IP=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=yousma-rke2-cluster-master" \
            --query 'Reservations[0].Instances[0].PublicIpAddress' \
            --output text)
          if [ -z "$MASTER_IP" ] || [ "$MASTER_IP" == "None" ]; then
            echo "❌ Failed to get Master IP from AWS!"
            exit 1
          fi
          echo "✅ MASTER_IP: $MASTER_IP"
          echo "master_ip=$MASTER_IP" >> $GITHUB_OUTPUT

      - name: Fetch kubeconfig
        run: |
          MASTER_IP="${{ steps.get_master_ip.outputs.master_ip }}"
          echo "Using MASTER_IP: $MASTER_IP"
          
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/rke2-key.pem
          chmod 600 ~/.ssh/rke2-key.pem
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/rke2-key.pem ubuntu@$MASTER_IP "sudo cp /etc/rancher/rke2/rke2.yaml /tmp/rke2.yaml && sudo chmod 644 /tmp/rke2.yaml"
          scp -o StrictHostKeyChecking=no -i ~/.ssh/rke2-key.pem ubuntu@$MASTER_IP:/tmp/rke2.yaml ./kubeconfig
          sed -i "s/127.0.0.1/$MASTER_IP/g" ./kubeconfig
          export KUBECONFIG=./kubeconfig

      - name: Run EBS CSI Script
        working-directory: scripts
        run: bash ebs-csi.sh